<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #333;
    }
    .status {
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status.active {
      background: #d4edda;
      color: #155724;
    }
    .status.inactive {
      background: #f8d7da;
      color: #721c24;
    }
    .status.waiting {
      background: #fff3cd;
      color: #856404;
    }
    .config-summary {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .config-summary strong {
      display: block;
      margin-bottom: 4px;
    }
    .config-summary div {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    button {
      width: 100%;
      padding: 8px;
      margin: 4px 0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-primary {
      background: #007bff;
      color: white;
    }
    .btn-primary:hover {
      background: #0056b3;
    }
    .btn-secondary {
      background: #6c757d;
      color: white;
    }
    .btn-secondary:hover {
      background: #545b62;
    }
    .timer-display {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      padding: 8px;
      margin: 8px 0;
      background: #e9ecef;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h2>🔒 Tab Keeper</h2>
  
  <div id="status" class="status inactive">
    Loading...
  </div>
  
  <div class="config-summary">
    <strong>Target URL:</strong>
    <div id="targetUrl">Not configured</div>
    <strong style="margin-top: 8px;">Username:</strong>
    <div id="username">Not configured</div>
  </div>
  
  <div id="timerDisplay" class="timer-display" style="display: none;">
    Returning in: <span id="countdown">--:--</span>
  </div>
  
  <button id="openOptions" class="btn-primary">⚙️ Settings</button>
  <button id="switchNow" class="btn-secondary">🔄 Switch to Target Now</button>
  
  <script src="popup.js"></script>
</body>
</html>
