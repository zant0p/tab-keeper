name: Auto-Release Chrome Extension

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0, v1.0.1, etc.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.1)'
        required: true
        type: string

permissions:
  contents: write  # Required to create releases
  actions: read    # Required to read workflow artifacts

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'  # Use Node.js 24 instead of deprecated Node.js 20

jobs:
  build-release:
    name: Build & Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Building version: $VERSION"
      
      - name: Validate manifest version
        run: |
          MANIFEST_VERSION=$(grep '"version":' manifest.json | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          if [ "$MANIFEST_VERSION" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "❌ ERROR: Version mismatch!"
            echo "   Tag version: ${{ steps.version.outputs.VERSION }}"
            echo "   Manifest version: $MANIFEST_VERSION"
            echo ""
            echo "   Please update manifest.json version before tagging."
            exit 1
          fi
          echo "✅ Version validated: ${{ steps.version.outputs.VERSION }}"
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
      
      - name: Create extension package
        run: |
          # Create ZIP with only necessary files
          zip -r tab-keeper-${{ steps.version.outputs.VERSION }}.zip \
            manifest.json \
            background.js \
            content.js \
            popup.html \
            popup.js \
            options.html \
            options.js \
            icons/ \
            -x "*.md" \
            -x "*.py" \
            -x "*.sh" \
            -x ".github/*" \
            -x ".git/*" \
            -x "__pycache__/*"
          
          echo "✅ Created tab-keeper-${{ steps.version.outputs.VERSION }}.zip"
          ls -lh tab-keeper-${{ steps.version.outputs.VERSION }}.zip
      
      - name: Upload ZIP to release
        uses: softprops/action-gh-release@v1
        with:
          name: Tab Keeper v${{ steps.version.outputs.VERSION }}
          body: |
            ## Tab Keeper v${{ steps.version.outputs.VERSION }}
            
            ### 📦 Installation
            
            #### Option 1: Load Unpacked (Development)
            1. Download `tab-keeper-${{ steps.version.outputs.VERSION }}.zip` from Assets below
            2. Unzip the file
            3. Go to `chrome://extensions/`
            4. Enable **Developer mode**
            5. Click **Load unpacked**
            6. Select the unzipped folder
            
            #### Option 2: Package as CRX (Production)
            1. Follow steps from Option 1
            2. Instead of "Load unpacked", click **Pack extension**
            3. Select the unzipped folder
            4. Chrome creates `.crx` and `.pem` files
            5. Install the `.crx` file
            6. **⚠️ Save the `.pem` file safely!** (needed for future updates)
            
            ### 🔄 Auto-Update
            
            Once installed via CRX, the extension auto-updates from GitHub releases.
            Chrome checks for updates every ~5 hours.
            
            **Update URL:** `https://raw.githubusercontent.com/${{ github.repository }}/main/updates.xml`
            
            ### 📝 What's New
            
            - Version ${{ steps.version.outputs.VERSION }}
            - Released: $(date +%Y-%m-%d)
            
            ---
            
            **Full changelog:** See commit history for this tag
            
            **Auto-generated by GitHub Actions** 🤖
          files: chrome-extensions/tab-keeper-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update updates.xml in repository
        run: |
          # Update version in updates.xml
          sed -i "s/version='[0-9.]*'/version='${{ steps.version.outputs.VERSION }}'/g" updates.xml
          sed -i "s/download\/v[0-9.]*/download\/v${{ steps.version.outputs.VERSION }}/g" updates.xml
          
          echo "✅ Updated updates.xml to version ${{ steps.version.outputs.VERSION }}"
          cat updates.xml
      
      - name: Commit updated updates.xml
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Update updates.xml to v${{ steps.version.outputs.VERSION }} [skip ci]"
          file_pattern: updates.xml
          skip_checkout: true
      
      - name: Release complete
        run: |
          echo ""
          echo "=============================================="
          echo "🎉 Release v${{ steps.version.outputs.VERSION }} created successfully!"
          echo "=============================================="
          echo ""
          echo "✅ ZIP package uploaded to GitHub Release"
          echo "✅ updates.xml auto-updated"
          echo ""
          echo "📦 Download: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.VERSION }}"
          echo ""
          echo "🔧 Next steps:"
          echo "   1. Download the ZIP from the release"
          echo "   2. Unzip locally"
          echo "   3. chrome://extensions/ → Developer mode"
          echo "   4. Click 'Pack extension' (first time only)"
          echo "   5. Install the .crx file"
          echo ""
          echo "🔄 Auto-update will handle future releases!"
          echo "=============================================="
