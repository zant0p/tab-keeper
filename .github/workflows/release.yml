name: Chrome Extension Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, v1.0.1, etc.)

permissions:
  contents: write  # Required to create GitHub releases

jobs:
  build-and-release:
    name: Build & Release Chrome Extension
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(grep '"version":' chrome-extensions/tab-keeper/manifest.json | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          TAG_VERSION="${{ steps.get_version.outputs.VERSION }}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch!"
            echo "   Tag: v$TAG_VERSION"
            echo "   Manifest: $MANIFEST_VERSION"
            echo "   Please update manifest.json version to match the tag."
            exit 1
          fi
          echo "✅ Version match: v$TAG_VERSION"
      
      - name: Create ZIP package
        run: |
          cd chrome-extensions/tab-keeper
          python3 << 'PYTHON_SCRIPT'
          import zipfile
          import os
          from pathlib import Path
          
          exclude_files = {
            'README.md', 'PUBLISHING.md', 'privacy-policy.md', 
            'generate-icons.py', 'package-for-cws.py', 'release.sh',
            'AUTOUPDATE-GUIDE.md', 'updates.xml'
          }
          exclude_dirs = {'.git', '__pycache__', 'node_modules', 'scripts', '.github'}
          
          zip_path = Path('tab-keeper.zip')
          with zipfile.ZipFile(zip_path, 'w', zipfile.ZIP_DEFLATED) as zipf:
              for root, dirs, files in os.walk('.'):
                  dirs[:] = [d for d in dirs if d not in exclude_dirs]
                  for file in files:
                      if file in exclude_files or file.endswith('.pyc'):
                          continue
                      file_path = Path(root) / file
                      arcname = file_path.relative_to(Path('.'))
                      zipf.write(file_path, arcname)
          
          print(f"✅ Created {zip_path}")
          PYTHON_SCRIPT
      
      - name: Package as CRX (Chrome Extension)
        id: package_crx
        run: |
          echo "⚠️ CRX packaging requires .pem key for signing"
          echo "   GitHub Actions cannot securely store your private key"
          echo ""
          echo "📦 Manual step required:"
          echo "   1. Download tab-keeper.zip from this workflow artifacts"
          echo "   2. Unzip locally"
          echo "   3. Go to chrome://extensions/"
          echo "   4. Developer mode → Pack extension"
          echo "   5. Select the unzipped folder"
          echo "   6. Upload tab-keeper.crx to this release manually"
          echo ""
          echo "✅ ZIP package created as workflow artifact"
      
      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tab-keeper-${{ steps.get_version.outputs.VERSION }}
          path: chrome-extensions/tab-keeper/tab-keeper.zip
          retention-days: 30
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Tab Keeper v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Tab Keeper v${{ steps.get_version.outputs.VERSION }}
            
            ### 📦 Installation
            
            **Note:** CRX file must be uploaded manually (requires private signing key).
            
            1. Download `tab-keeper.zip` from Assets below
            2. Unzip the file
            3. In Chrome: `chrome://extensions/` → Developer mode
            4. Click "Pack extension" → Select the unzipped folder
            5. Install the generated `.crx` file
            
            ### 🔄 Auto-Update
            
            Once installed, the extension will auto-update from GitHub releases.
            No manual updates needed!
            
            ### 📝 Changes
            
            - Version ${{ steps.get_version.outputs.VERSION }}
            - Released: $(date +%Y-%m-%d)
            
            ---
            
            **Auto-generated by GitHub Actions**
          draft: true  # Create as draft so you can add CRX before publishing
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Output release instructions
        run: |
          echo ""
          echo "=============================================="
          echo "🎉 Release draft created successfully!"
          echo "=============================================="
          echo ""
          echo "✅ ZIP package uploaded as workflow artifact"
          echo "✅ GitHub release draft created"
          echo ""
          echo "⚠️ MANUAL STEPS REQUIRED:"
          echo ""
          echo "1. Download the ZIP artifact from this workflow:"
          echo "   https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "2. Create CRX file locally (requires your .pem key):"
          echo "   - Unzip tab-keeper.zip"
          echo "   - chrome://extensions/ → Developer mode → Pack extension"
          echo "   - Select the unzipped folder"
          echo ""
          echo "3. Upload CRX to the release draft:"
          echo "   https://github.com/${{ github.repository }}/releases"
          echo ""
          echo "4. Publish the release when ready!"
          echo ""
          echo "=============================================="
